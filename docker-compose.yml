services:
  postgres:
    image: postgres:16-alpine
    container_name: agilite-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agilite
    volumes:
      - agilite-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agilite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agilite-postgres-data:
